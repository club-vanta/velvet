default_install_hook_types: [pre-commit, pre-push]

repos:
  - repo: local
    hooks:
      - id: typecheck
        name: TypeScript type check
        entry: npx tsc --noEmit
        language: node
        pass_filenames: false
        types_or: [ts, tsx]

      - id: prettier
        name: Prettier format check
        entry: npx prettier --check .
        language: node
        pass_filenames: false
        types_or: [ts, tsx, json, css, markdown]

      - id: eslint
        name: ESLint
        entry: npx eslint .
        language: node
        pass_filenames: false
        types_or: [ts, tsx]

      - id: vitest
        name: Vitest unit tests
        entry: npx vitest run
        language: node
        pass_filenames: false
        types_or: [ts, tsx]
        stages: [pre-push]
